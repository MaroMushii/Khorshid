name: mirror

on:
  schedule:
    - cron: "*/5 * * * *"
    - cron: "2-59/5 * * * *"
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - "mirror/**"
      - ".github/workflows/mirror.yml"

permissions:
  contents: write

concurrency:
  group: mirror
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout main (scraper sources + manifest)
        uses: actions/checkout@v6
        with:
          ref: main
          path: src

      - name: Checkout export branch (target tree)
        uses: actions/checkout@v6
        with:
          ref: export
          path: out

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Set up Node 22
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: src/mirror/pnpm-lock.yaml

      - name: Install scraper dependencies
        working-directory: src/mirror
        run: pnpm install --frozen-lockfile

      - name: Run scraper
        working-directory: src/mirror
        run: pnpm exec tsx scrape.ts ../../out channels.json

      - name: Commit & push if changed
        working-directory: out
        run: |
          git add -A
          if git diff --quiet --staged; then
            echo "no changes — skipping commit"
            exit 0
          fi
          git config user.email "282584007+MaroMushii@users.noreply.github.com"
          git config user.name "khorshid-mirror[bot]"
          STAMP="$(date -u +%Y-%m-%dT%H:%MZ)"
          CHANGES="$(git diff --staged --name-only | wc -l | tr -d ' ')"
          git commit -m "mirror: $STAMP ($CHANGES files)"
          git push origin HEAD:export
