name: aggregator

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:
    inputs:
      date:
        description: "Date to aggregate (YYYY-MM-DD, defaults to today)"
        required: false

permissions:
  contents: write
  models: read

concurrency:
  group: aggregator
  cancel-in-progress: true

jobs:
  aggregate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout main (aggregator sources)
        uses: actions/checkout@v6
        with:
          ref: main
          path: src

      - name: Checkout export branch (feed output target)
        uses: actions/checkout@v6
        with:
          ref: export
          path: out

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Set up Node 22
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: src/mirror/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: src/mirror
        run: pnpm install --frozen-lockfile

      - name: Run aggregator
        working-directory: src/mirror
        run: pnpm exec tsx aggregate.ts ../../out ${{ github.event.inputs.date || '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}

      - name: Commit & push feed if changed
        working-directory: out
        run: |
          git add feed/
          if git diff --quiet --staged; then
            echo "no changes — skipping commit"
            exit 0
          fi
          git config user.email "282584007+MaroMushii@users.noreply.github.com"
          git config user.name "khorshid-aggregator[bot]"
          DATE="${{ github.event.inputs.date || '' }}"
          DATE="${DATE:-$(date -u +%Y-%m-%d)}"
          git commit -m "aggregator: feed/${DATE}"
          git pull origin export --rebase
          git push origin HEAD:export
